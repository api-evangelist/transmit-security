aid: transmit-security
name: Transmit Security
description: >
  Transmit Security provides the Mosaic platform, a comprehensive CIAM (Customer Identity and
  Access Management) solution offering REST APIs for passkey and WebAuthn authentication, fraud
  detection and risk-based access control, identity orchestration, identity verification, and
  user journey management. The platform delivers unified identity management across customer,
  business, and workforce contexts through an API-first architecture with OAuth2 and JWT
  authentication. Mosaic serves leading banks, insurers, and retailers worldwide with region-specific
  deployments across the US, EU, Canada, and Australia, backed by a 99.99% uptime SLA.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - CIAM
  - Identity
  - Authentication
  - Passkeys
  - WebAuthn
  - Fraud Detection
  - Risk Management
  - Identity Verification
  - Orchestration
  - OAuth2
  - Security
  - SSO
